name: Bug Report
description: Report a bug in Start Time
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much as you can.

  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
      placeholder: e.g. 2026.6.1
    validations:
      required: true

  - type: input
    id: integration-version
    attributes:
      label: Start Time version
      placeholder: e.g. 1.1.8
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - HACS
        - Manual
        - Other
    validations:
      required: true

  - type: textarea
    id: bug-description
    attributes:
      label: Bug description
      description: What happens? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Settings → System → Logs (filter by start_time)
      render: shell
