name: Security audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: pipx install pip-audit
      - run: pip-audit -r requirements_dev.txt -r requirements_test.txt

  osv-scanner:
    name: OSV-Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: google/osv-scanner-action/osv-scanner-action@v2
        with:
          scan-args: |-
            --recursive
            --skip-git
            ./

  lockfile-freshness:
    name: Lockfile age check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check lockfile age (fails if > 90 days)
        run: |
          for lock in package-lock.json yarn.lock pnpm-lock.yaml poetry.lock Pipfile.lock Cargo.lock; do
            [ -f "$lock" ] || continue
            AGE=$(( ($(date +%s) - $(git log -1 --format=%ct -- "$lock")) / 86400 ))
            if [ "$AGE" -gt 90 ]; then
              echo "::error file=$lock::$lock not refreshed for $AGE days"
              exit 1
            fi
          done
          echo "No stale lockfiles."

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
