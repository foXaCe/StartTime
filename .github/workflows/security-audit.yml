name: Security audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install pip-audit
      # The integration ships zero runtime dependencies. Audit only the dev
      # tooling this repo controls directly: pytest-homeassistant-custom-
      # component pins Home Assistant core's full dependency tree, which is
      # audited (and fixed) upstream by Home Assistant itself.
      - run: |
          grep -hv -e "pytest-homeassistant-custom-component" -e "^-r" \
            requirements_dev.txt requirements_test.txt > /tmp/audit-requirements.txt
          python -m pip_audit -r /tmp/audit-requirements.txt

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
